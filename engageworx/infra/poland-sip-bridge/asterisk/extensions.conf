; /etc/asterisk/extensions.conf
; Inbound Polish carrier calls → hand off to ARI Stasis app 'poland-bridge'.
; The Node bridge controls the entire call flow via the ARI WebSocket.

[general]
static = yes
writeprotect = yes

[poland-inbound]
; Any call that arrives from the carrier lands here.
; Answer and hand to the ARI Stasis application so the Node bridge takes over.
exten => _+48.,1,NoOp(Poland inbound from ${CALLERID(num)} to ${EXTEN})
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Stasis(poland-bridge,${CALLERID(num)},${EXTEN})
 same => n,Hangup()

; Catch-all for non-Polish numbers
exten => _X.,1,NoOp(Non-Poland call — hanging up)
 same => n,Playback(tt-monkeysintro)
 same => n,Hangup()
