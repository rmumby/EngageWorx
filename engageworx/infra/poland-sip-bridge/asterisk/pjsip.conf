; /etc/asterisk/pjsip.conf
; Inbound SIP trunk from the Polish carrier (IP 64.79.144.100).
; No registration — peer-to-peer by source IP.

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

[transport-tcp]
type = transport
protocol = tcp
bind = 0.0.0.0:5060

; --- Polish carrier trunk ---

[poland-carrier]
type = endpoint
context = poland-inbound
dtmf_mode = rfc4733
disallow = all
allow = opus,g722,alaw,ulaw
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
ice_support = no
aors = poland-carrier
from_domain = 64.79.144.100
trust_id_inbound = yes

[poland-carrier]
type = aor
max_contacts = 1
qualify_frequency = 60

[poland-carrier]
type = identify
endpoint = poland-carrier
match = 64.79.144.100/32
; Add extra carrier source IPs here:
; match = x.x.x.x/32

; ACL — deny everyone except the carrier
[acl]
type = acl
deny = 0.0.0.0/0
permit = 64.79.144.100/32
; permit = x.x.x.x/32
